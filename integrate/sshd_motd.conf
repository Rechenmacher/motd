# /etc/ssh/sshd_config.d/motd.conf — sshd settings for dynamic MOTD
#
# Copy to /etc/ssh/sshd_config.d/motd.conf and reload sshd:
#   sudo systemctl reload sshd
#
# This disables the static /etc/motd in favour of update-motd.d scripts.

PrintMotd no           # don't print static /etc/motd (PAM will handle it)
PrintLastLog yes       # keep "Last login:" line if you want it
Banner none            # no pre-auth banner (set to /etc/issue.net if desired)

name: Generate daily MOTD

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC every day
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write           # needed to commit today.json back

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          # Only install anthropic if we're using it — others use stdlib only
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            pip install anthropic
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate today's MOTD
        run: python3 generator/today.py --force --output today.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          # OLLAMA_URL not set here — Ollama is local only

      - name: Commit today.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add today.json
          # only commit if the file actually changed
          git diff --cached --quiet || \
            git commit -m "chore: daily MOTD $(date -u +%Y-%m-%d) [skip ci]"
          git push
